# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

# Input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat # no mouse accel
}

# General
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 4
    border_size = 2
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg # default
    col.active_border = rgba(39FF14ee)
    col.inactive_border = rgba(fe30a5ee)
    # color palette = 38ff13, b4ff79, fe30a5, ed0077, b6018b

    layout = dwindle
    # no_cursor_warps = true;
}

# Master Layout
#master {
#    allow_small_split = true
#    # mfact = 1.00
#    new_is_master = false
#    new_on_top = false
#}

# Decoration
decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 2
    multisample_edges = true # enable antialiasing for rounded corners
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1

    blur { # new blur
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

    dim_around = 0.95
}

# Animations
animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Dwindle
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# Master
master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

# Gestures
gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true

    vrr = 1 # adaptive sync = 0 off, 1 on, 2 fullscreen only

    # animate_manual_resizes = true
    # animate_mouse_windowdragging = true # can cause weird behavior

    # enable_swallow = true # may be better in kitty.conf
    # render_ahead_of_time = true # warning: buggy
    # render_ahead_safezone = 1
    # mouse_move_focuses_monitor = false
}


